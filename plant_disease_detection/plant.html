<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Doctor AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    
    <style>
        /* DARK THEME & GLASSMORPHISM */
        body { 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* IMAGE PREVIEW AREA */
        #preview-container {
            width: 100%;
            height: 250px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px dashed rgba(255,255,255,0.1);
            position: relative;
        }

        #preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .icon-placeholder {
            font-size: 40px;
            opacity: 0.3;
        }

        /* BUTTON STYLING */
        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.6);
        }

        .btn-upload:active { transform: translateY(0); }

        input[type="file"] { display: none; }

        /* RESULTS */
        #result-area {
            margin-top: 25px;
            min-height: 50px;
        }

        .label {
            color: #4fd1c5;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .confidence {
            color: #a0aec0;
            font-size: 13px;
        }

        .error-msg { color: #fc8181; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Plant Doctor AI</h1>
        
        <div id="preview-container">
            <div id="placeholder" class="icon-placeholder">🌿</div>
            <img id="preview-image" alt="Leaf Preview">
        </div>

        <div id="result-area">
            <div id="status" style="color: #ccc; font-size: 14px;">Loading AI...</div>
        </div>

        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
            Upload Leaf Photo
        </button>
        
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <script>
        // 1. CLASS NAMES (Must match your training exactly)
        const CLASS_NAMES = [
            'Pepper__bell___Bacterial_spot', 'Pepper__bell___healthy', 
            'Potato___Early_blight', 'Potato___Late_blight', 'Potato___healthy', 
            'Tomato_Bacterial_spot', 'Tomato_Early_blight', 'Tomato_Late_blight', 
            'Tomato_Leaf_Mold', 'Tomato_Septoria_leaf_spot', 
            'Tomato_Spider_mites_Two_spotted_spider_mite', 'Tomato__Target_Spot', 
            'Tomato__Tomato_YellowLeaf__Curl_Virus', 'Tomato__Tomato_mosaic_virus', 
            'Tomato_healthy'
        ];

        let model;
        const statusDiv = document.getElementById('status');
        const resultArea = document.getElementById('result-area');

        // 2. LOAD MODEL (With "Strict: False" to fix version errors)
        async function init() {
            try {
                // strict: false allows Keras 3 models to load even if versions mismatch
                model = await tf.loadLayersModel('./model/model.json', { strict: false });
                
                statusDiv.innerText = "Model Ready! 🚀";
                console.log("Model loaded successfully");
            } catch (e) {
                statusDiv.innerText = "⚠️ Failed to load model.";
                resultArea.innerHTML += `<div class="error-msg">${e.message}</div>`;
                console.error(e);
            }
        }

        // 3. PREDICTION LOGIC
        async function predict(imgElement) {
            if (!model) {
                alert("Model is still loading...");
                return;
            }

            statusDiv.innerText = "Analyzing...";

            // TF.js Tidy automatically cleans up memory
            tf.tidy(() => {
                // Convert image to Tensor
                let tensor = tf.browser.fromPixels(imgElement)
                    .resizeNearestNeighbor([224, 224]) // Resize to training size
                    .toFloat()
                    .expandDims();

                // Predict
                const predictions = model.predict(tensor).dataSync();
                
                // Get top result
                const maxScore = Math.max(...predictions);
                const index = predictions.indexOf(maxScore);

                const label = CLASS_NAMES[index].replace(/_/g, ' ');
                const confidence = (maxScore * 100).toFixed(1);

                // Show Result
                resultArea.innerHTML = `
                    <div class="label">${label}</div>
                    <div class="confidence">${confidence}% Confidence</div>
                `;
            });
        }

        // 4. HANDLE FILE UPLOAD
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('preview-image');
                const placeholder = document.getElementById('placeholder');
                
                img.src = event.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';

                // Wait for image to load before predicting
                img.onload = () => predict(img);
            }
            reader.readAsDataURL(file);
        });

        // Initialize App
        init();
    </script>

</body>
</html>
